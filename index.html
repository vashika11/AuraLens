<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraLens</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="stars"></canvas>
<canvas id="nebula"></canvas>

<div class="header">AuraLens</div>

<div class="controls">

<div class="toggle">
<span>Dark</span>
<label class="switch">
<input type="checkbox" id="themeToggle" checked>
<span class="slider"></span>
</label>
</div>

<div class="toggle">
<span>Sound</span>
<label class="switch">
<input type="checkbox" id="soundToggle" checked>
<span class="slider"></span>
</label>
</div>

</div>

<div class="container">

<h1>AuraLens</h1>
<p class="subtitle">Visualize your emotional energy</p>

<select id="mood">
<option disabled selected>Select your mood</option>
<option>Happy</option>
<option>Calm</option>
<option>Sad</option>
<option>Anxious</option>
<option>Excited</option>
<option>Tired</option>
<option>Motivated</option>
<option>Dreamy</option>
<option>Lonely</option>
<option>Angry</option>
<option>Loving</option>
<option>Confident</option>
<option>Curious</option>
<option>Playful</option>
<option>Relaxed</option>
</select>

<textarea id="note" placeholder="Optional: describe more about your mood or your day..."></textarea>

<div class="buttons">
<button class="primary" onclick="showAura()">Show Aura</button>
<button class="secondary" onclick="saveMood()">Save</button>
</div>

<div class="aura-wrap">

<div class="aura-glow" id="glow"></div>

<div class="halo-ring"></div>

<div class="aura" id="aura"></div>

<div class="orbit orbit1" id="orbit1"></div>
<div class="orbit orbit2" id="orbit2"></div>
<div class="orbit orbit3" id="orbit3"></div>

</div>

<div id="quote" class="quote"></div>

<div id="badge" class="badge">No mood yet</div>

<footer class="footer">
Created by Vashika Tyagi — AuraLens
</footer>

</div>

<script src="script.js"></script>
<script src="particles.js"></script>

</body>
</html>
